<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Corona -->
  <g transform="translate(100,28)">
    <!-- Base corona -->
    <rect x="-38" y="0" width="76" height="18" rx="3" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
    <!-- Fascia superiore corona -->
    <rect x="-34" y="-10" width="68" height="12" rx="2" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
    <!-- Gemme verdi -->
    <circle cx="-22" cy="-4" r="5" fill="#2E7D32"/>
    <circle cx="0" cy="-4" r="5" fill="#2E7D32"/>
    <circle cx="22" cy="-4" r="5" fill="#2E7D32"/>
    <!-- Rombo blu centrale -->
    <polygon points="0,-14 5,-9 0,-4 -5,-9" fill="#1565C0"/>
    <!-- Lettera P -->
    <text x="0" y="-6" text-anchor="middle" font-size="7" font-weight="bold" fill="#1565C0" font-family="serif">P</text>
    <!-- Archi corona -->
    <path d="M-34,-10 Q-28,-22 -22,-10" fill="none" stroke="#B8860B" stroke-width="1.5"/>
    <path d="M-11,-10 Q-5,-22 1,-10" fill="none" stroke="#B8860B" stroke-width="1.5"/>
    <path d="M11,-10 Q17,-22 23,-10" fill="none" stroke="#B8860B" stroke-width="1.5"/>
  </g>

  <!-- Scudo principale -->
  <!-- Bordo blu esterno -->
  <path d="M20,55 L20,165 Q20,195 100,215 Q180,195 180,165 L180,55 Z" fill="#1565C0"/>
  <!-- Fascia gialla -->
  <path d="M26,55 L26,88 L174,88 L174,55 Z" fill="#FFD700"/>
  <!-- Fascia rossa ottagonale interna -->
  <path d="M28,92 L28,163 Q28,188 100,207 Q172,188 172,163 L172,92 Z" fill="#C62828"/>
  <!-- Centro bianco ottagonale -->
  <path d="M52,105 L52,158 Q52,180 100,193 Q148,180 148,158 L148,105 L138,96 L62,96 Z" fill="white"/>

  <!-- Albero di ulivo stilizzato -->
  <!-- Tronco -->
  <rect x="96" y="155" width="8" height="28" fill="#5D4037"/>
  <!-- Radici -->
  <path d="M96,183 Q88,188 82,186" fill="none" stroke="#5D4037" stroke-width="2.5"/>
  <path d="M104,183 Q112,188 118,186" fill="none" stroke="#5D4037" stroke-width="2.5"/>
  <!-- Chioma principale -->
  <ellipse cx="100" cy="140" rx="28" ry="22" fill="#388E3C"/>
  <!-- Chioma sinistra -->
  <ellipse cx="78" cy="148" rx="18" ry="14" fill="#2E7D32"/>
  <!-- Chioma destra -->
  <ellipse cx="122" cy="148" rx="18" ry="14" fill="#2E7D32"/>
  <!-- Chioma alto -->
  <ellipse cx="100" cy="122" rx="20" ry="16" fill="#43A047"/>
  <!-- Highlights foglie -->
  <ellipse cx="90" cy="135" rx="8" ry="6" fill="#4CAF50" opacity="0.6"/>
  <ellipse cx="112" cy="138" rx="7" ry="5" fill="#4CAF50" opacity="0.6"/>
  <ellipse cx="100" cy="115" rx="9" ry="7" fill="#66BB6A" opacity="0.5"/>

  <!-- Gemme gialle nella fascia gialla -->
  <circle cx="46" cy="71" r="7" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>
  <circle cx="68" cy="71" r="7" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>
  <circle cx="90" cy="71" r="7" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>
  <circle cx="112" cy="71" r="7" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>
  <circle cx="134" cy="71" r="7" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>
  <circle cx="154" cy="71" r="7" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>
</svg>
